<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square86 - Kart Oyunu</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .kart.secili {
            border: 3px solid #ffd700 !important;
            transform: translateY(-10px);
            background-color: #e0f7fa !important;
        }
        .bot-indirilenler {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 5px;
        }
        .bot-indirilenler .kart {
            width: 40px;
            height: 55px;
            font-size: 14px;
            background-color: #f0f0f0;
        }
        .ceza-yazi {
            color: #ff4e50;
            font-weight: bold;
        }
        #teklif-alani {
            background-color: #1a3a2a;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #ffbc42;
            text-align: center;
            margin: 15px 0;
        }
    </style>
</head>
<body>

    <div id="oyun-alani">
        <h2>SQUARE86</h2>
        
        <!-- RAKİP BÖLÜMÜ -->
        <div class="bolum">
            <h3>Rakip (Bot)</h3>
            <div id="rakip-kartlari" class="kart-alani"></div>
            <p>Rakip Puanı: <span id="rakip-puan-yazi">0</span></p>
            <p style="font-size: 13px; color: #ffbc42;" id="bot-durum-yazi">Henüz hamle yapmadı</p>
            <div id="bot-indirilen-kartlar" class="bot-indirilenler"></div>
        </div>

        <!-- ORTA ALAN: TEKLİF PANOSU -->
        <div id="teklif-alani">
            <span style="color: #fff;">Yerdeki Durum:</span> 
            <strong id="teklif-kart-yazi" style="color: #ffd700; font-size: 18px;">-</strong>
        </div>

        <!-- OYUNCU BÖLÜMÜ -->
        <div class="bolum">
            <h3>Senin Elin (Seçmek için kartlara tıkla)</h3>
            <div id="oyuncu-kartlari" class="kart-alani"></div>
            <p>Senin Puanın: <span id="oyuncu-puan-yazi">0</span> | Biriken Cezan: <span id="oyuncu-ceza-yazi" class="ceza-yazi">0</span></p>
        </div>

        <!-- HAMLE BUTONLARI -->
        <div id="butonlar">
            <button onclick="kombinasyonDene()">Seçili Kartlarla Kombinasyon Yap</button>
            <button onclick="pasGecDene()" class="pas-btn">Seçili Kartı Teklif Et (Pas)</button>
            <button onclick="yerdekiKartiAlDene()" id="yerden-al-btn" style="background-color: #2196F3; display: none; margin-top: 8px; width: 100%; font-weight: bold; padding: 10px;">Yerdeki Teklif Kartını Al</button>
        </div>
        
        <div id="deste-bilgi">
            <p>Destede Kalan Kart: <span id="kalan-kart-yazi">86</span></p>
            <p id="bildirim-alani" style="color: #ffd700; font-weight: bold; margin-top:10px;"></p>
        </div>
    </div>

    <script src="Square86.js"></script>
    
    <script>
        let secilenKartEndeksleri = [];

        function kartSec(index) {
            let pozisyon = secilenKartEndeksleri.indexOf(index);
            if (pozisyon > -1) {
                secilenKartEndeksleri.splice(pozisyon, 1);
            } else {
                secilenKartEndeksleri.push(index);
            }
            arayuzuGuncelle();
        }

        function arayuzuGuncelle() {
            // 1. Oyuncu Elini Çiz
            const oyuncuAlani = document.getElementById("oyuncu-kartlari");
            oyuncuAlani.innerHTML = "";
            window.oyuncuEli.forEach((kart, index) => {
                let isSecili = secilenKartEndeksleri.includes(index) ? "secili" : "";
                let kartKlas = kart === "JOKER" ? "kart joker" : "kart";
                oyuncuAlani.innerHTML += `<div class="${kartKlas} ${isSecili}" onclick="kartSec(${index})">${kart}</div>`;
            });

            // 2. Rakip Elini Çiz
            const rakipAlani = document.getElementById("rakip-kartlari");
            rakipAlani.innerHTML = "";
            window.rakipEli.forEach(() => {
                rakipAlani.innerHTML += `<div class="kart kapali">🎴</div>`;
            });

            // 3. Botun En Son İndirdiği Kartları Göster
            const botIndirilenAlani = document.getElementById("bot-indirilen-kartlar");
            botIndirilenAlani.innerHTML = "";
            window.rakipSonIndirilenler.forEach(kart => {
                let kartKlas = kart === "JOKER" ? "kart joker" : "kart";
                botIndirilenAlani.innerHTML += `<div class="${kartKlas}">${kart}</div>`;
            });

            // 4. Yazıları ve Skorları Doldur
            document.getElementById("oyuncu-puan-yazi").innerText = window.oyuncuPuan;
            document.getElementById("rakip-puan-yazi").innerText = window.rakipPuan;
            document.getElementById("oyuncu-ceza-yazi").innerText = window.suAnkiCezayiHesapla(window.oyuncuCezaHavuzu);
            document.getElementById("kalan-kart-yazi").innerText = window.deste.length;
            document.getElementById("bot-durum-yazi").innerText = window.rakipSonHamleTipi;

            // 5. Mavi "Yerden Al" Butonunu Kontrol Et
            const yerdenAlBtn = document.getElementById("yerden-al-btn");
            if (window.yerdekiTeklifKarti !== null && window.teklifSahibi === "RAKIP") {
                yerdenAlBtn.style.display = "inline-block";
            } else {
                yerdenAlBtn.style.display = "none";
            }
        }

        function kombinasyonDene() {
            if (secilenKartEndeksleri.length === 0) {
                alert("Lütfen kombinasyon yapmak için kart seçin!");
                return;
            }
            
            let secilenKartlar = secilenKartEndeksleri.map(i => window.oyuncuEli[i]);
            let analiz = window.eliHesapla(secilenKartlar);
            
            if (analiz.tip === "PAS") {
                alert("Seçtiğin kartlardan geçerli bir çift, 4'lü veya seri çıkmıyor!");
                return;
            }
            if (analiz.tip.includes("ÇİFT") && secilenKartlar.length !== 2) {
                alert("Çift kombinasyonu için sadece 2 kart seçmelisin!");
                return;
            }
            if ((analiz.tip.includes("4'LÜ") || analiz.tip.includes("SERİ")) && secilenKartlar.length !== 4) {
                alert("4'lü veya Seri yapabilmek için elindeki 4 kartın hepsini birden seçmelisin!");
                return;
            }

            if(window.yerdekiTeklifKarti !== null && window.teklifSahibi === "RAKIP") {
                window.rakipCezaHavuzu.push(window.yerdekiTeklifKarti);
                window.yerdekiTeklifKarti = null;
                window.teklifSahibi = null;
                document.getElementById("teklif-kart-yazi").innerText = "-";
            }

            window.oyuncuPuan += analiz.puan;
            document.getElementById("bildirim-alani").innerText = `Tebrikler! ${analiz.tip} indirdin, +${analiz.puan} Puan!`;

            secilenKartEndeksleri.sort((a,b) => b-a).forEach(i => {
                window.oyuncuEli.splice(i, 1);
            });

            // Kombinasyon yapınca el boşalırsa elini 4'e tamamla
            while (window.oyuncuEli.length < 4 && window.deste.length > 0) {
                window.oyuncuEli.push(window.deste.pop());
            }

            secilenKartEndeksleri = [];
            arayuzuGuncelle();

            if (window.deste.length === 0 && window.oyuncuEli.length === 0) {
                window.oyunBitti();
                return;
            }

            setTimeout(() => {
                window.rakipHamleYap();
                arayuzuGuncelle();
                if (window.deste.length === 0 && window.rakipEli.length === 0) window.oyunBitti();
            }, 1200);
        }

        function pasGecDene() {
            if (secilenKartEndeksleri.length !== 1) {
                alert("Pas geçmek için elinden tam olarak 1 kart seçmelisin!");
                return;
            }

            if(window.yerdekiTeklifKarti !== null && window.teklifSahibi === "RAKIP") {
                window.rakipCezaHavuzu.push(window.yerdekiTeklifKarti);
            }

            let index = secilenKartEndeksleri[0];
            
            // Kartı elden çıkartıyoruz
            window.yerdekiTeklifKarti = window.oyuncuEli.splice(index, 1)[0];
            window.teklifSahibi = "OYUNCU";
            
            document.getElementById("teklif-kart-yazi").innerText = window.yerdekiTeklifKarti + " (Senin Teklifin)";

            // MATEMATİKSEL KONTROL: 
            // Eğer kart attıktan sonra elimiz 4'ün altına düştüyse (3 kaldıysa) desteden ÇEK.
            // Eğer elimizde 5 kart vardı ve 1 atınca tam 4 kaldıysa, desteden KART ÇEKME!
            while (window.oyuncuEli.length < 4 && window.deste.length > 0) {
                window.oyuncuEli.push(window.deste.pop());
            }

            secilenKartEndeksleri = [];
            document.getElementById("bildirim-alani").innerText = "Pas geçtin ve kartını teklif ettin. Sıra rakipte...";
            arayuzuGuncelle();

            if (window.deste.length === 0 && window.oyuncuEli.length === 0) {
                window.oyunBitti();
                return;
            }

            setTimeout(() => {
                window.rakipHamleYap();
                arayuzuGuncelle();
                if (window.deste.length === 0 && window.rakipEli.length === 0) window.oyunBitti();
            }, 1200);
        }

        // İlk açılış
        window.oyunuBaslat();
        window.arayuzuGuncelle = arayuzuGuncelle; // Dışarıdan tetiklenebilsin diye bağladık
        arayuzuGuncelle();
    </script>
</body>
</html>
